<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club Ajedrez Mercenarios</title>

  <!-- LIBS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #020617;
      padding: 12px 16px;
      border-bottom: 1px solid #334155;
      position: relative;
      z-index: 1000;
    }

    .menu-toggle {
      display: none;
      font-size: 22px;
      cursor: pointer;
      color: white;
    }

    .menu {
      display: flex;
      gap: 20px;
      z-index: 2000;
    }

    .nav-item {
      cursor: pointer;
      color: #94a3b8;
      font-size: 16px;
    }

    .nav-item.active {
      color: #38bdf8;
      font-weight: bold;
    }

    /* CONTENT */
    .page {
      display: none;
      padding: 15px;
    }

    .page.active {
      display: block;
    }

    /* TABLE CONTAINER */
    .table-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid #334155;
      border-radius: 10px;
      position: relative;
      z-index: 1;
    }

    /* TABLE */
    table {
      border-collapse: collapse;
      min-width: 700px;
      width: 100%;
    }

    th,
    td {
      border: 1px solid #334155;
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #1e293b;
    }

    .player-name {
      text-align: left;
      padding-left: 10px;
      min-width: 140px;
    }

    .player-link {
      color: #38bdf8;
      text-decoration: none;
    }

    .player-link:hover {
      text-decoration: underline;
    }

    .highlight {
      background: #1e293b;
    }

    .win {
      color: #22c55e;
    }

    .draw {
      color: #eab308;
    }

    .loss {
      color: #ef4444;
    }

    /* MOBILE */
    @media (max-width: 600px) {

      h1 {
        font-size: 18px;
      }

      th,
      td {
        font-size: 12px;
        padding: 6px;
      }

      .player-name {
        min-width: 120px;
      }

      .menu-toggle {
        display: block;
      }

      .menu {
        display: none;
        flex-direction: column;
        background: #020617;
        position: absolute;
        top: 55px;
        left: 0;
        width: 100%;
        padding: 10px 0;
        border-top: 1px solid #334155;
      }

      .menu.active {
        display: flex;
      }

      .nav-item {
        padding: 10px 20px;
      }
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 3000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
    }

    .modal-content {
      background: #1e293b;
      margin: 40px auto;
      padding: 20px;
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
      text-align: center;
    }

    .close {
      float: right;
      cursor: pointer;
    }
  </style>

</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="menu" id="menu">
      <div class="nav-item active" onclick="showPage('actuales', this)">Torneos Actuales</div>
      <div class="nav-item" onclick="showPage('anteriores', this)">Resultados Anteriores</div>
      <div class="nav-item" onclick="showPage('fotos', this)">Fotos</div>
      <div class="nav-item" onclick="showPage('chismes', this)">Chismes</div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">✖</span>
      <div id="board" style="width:100%; max-width:350px; margin:auto;"></div>
      <br>
      <button onclick="prev()">◀</button>
      <button onclick="next()">▶</button>
    </div>
  </div>
  <!-- TORNEOS ACTUALES -->
  <div id="actuales" class="page active">
    <h1>♟️ Torneo FIDE Mercenarios 245</h1>

    <div class="table-container">
      <table id="crossTable"></table>
    </div>
  </div>

  <!-- RESULTADOS ANTERIORES -->
  <div id="anteriores" class="page">
    <h1>📊 Resultados Anteriores</h1>
    <p>Aquí puedes mostrar torneos pasados (luego conectamos CSV 👀)</p>
  </div>

  <!-- FOTOS -->
  <div id="fotos" class="page">
    <h1>📸 Fotos</h1>
    <p>Galería próximamente</p>
  </div>

  <!-- CHISMES -->
  <div id="chismes" class="page">
    <h1>🔥 Chismes</h1>
    <p>Drama ajedrecístico en desarrollo… 👀</p>
  </div>
  <script>

    // NAV
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("active");
    }

    function showPage(pageId, element) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById(pageId).classList.add("active");

      document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
      element.classList.add("active");

      document.getElementById("menu").classList.remove("active");
    }

    // PLAYERS
    const players = [
      { id: 1, name: "Fran", lichess: "dball7" },
      { id: 2, name: "Wero", lichess: "" },
      { id: 3, name: "Francisco Torres", lichess: "" },
      { id: 4, name: "Luis", lichess: "" },
      { id: 5, name: "Pedro", lichess: "" },
      { id: 6, name: "Ana", lichess: "" },
      { id: 7, name: "Sofia", lichess: "" },
      { id: 8, name: "Carlos", lichess: "" },
      { id: 9, name: "Mario", lichess: "" },
      { id: 10, name: "Elena", lichess: "" },
      { id: 11, name: "Raul", lichess: "" },
      { id: 12, name: "Diego", lichess: "" },
    ];

    // MATCHES
    const matches = [
      { white: 1, black: 2, result: 1 },
      { white: 1, black: 3, result: 0.5 },
      { white: 2, black: 3, result: 0 },
      { white: 4, black: 1, result: 0 },
      { white: 5, black: 1, result: 1 },
    ];

    // HELPERS

    function getResult(p1, p2) {
      const match = matches.find(m =>
        (m.white === p1 && m.black === p2) ||
        (m.white === p2 && m.black === p1)
      );

      if (!match) return "";

      let score;

      if (match.white === p1) {
        score = match.result;
      } else {
        score = match.result === 1 ? 0 :
          match.result === 0 ? 1 : 0.5;
      }

      // 🔥 SOLO PRIMER PARTIDA (Fran vs Wero)
      if ((p1 === 1 && p2 === 2 && score === 1)) {
        return `<span class="win" onclick="openGame()">1</span>`;
      }

      if (score === 1) return '<span class="win">1</span>';
      if (score === 0) return '<span class="loss">0</span>';
      return '<span class="draw">½</span>';
    }

    function calculatePoints(playerId) {
      let pts = 0;

      matches.forEach(m => {
        if (m.result === null) return;

        if (m.white === playerId) {
          pts += m.result;
        } else if (m.black === playerId) {
          pts += (m.result === 1 ? 0 :
            m.result === 0 ? 1 : 0.5);
        }
      });

      return pts;
    }

    function renderPlayerName(player) {
      if (player.lichess) {
        return `<a class="player-link" href="https://lichess.org/@/${player.lichess}" target="_blank">${player.name}</a>`;
      }
      return player.name;
    }

    // RENDER
    function renderTable() {

      let html = "<tr><th>#</th><th>Jugador</th>";

      players.forEach((p, i) => {
        html += `<th>${i + 1}</th>`;
      });

      html += "<th>Pts</th></tr>";

      players.forEach((p, i) => {

        html += `<tr>
      <td>${i + 1}</td>
      <td class="player-name">${renderPlayerName(p)}</td>
    `;

        players.forEach(op => {
          if (p.id === op.id) {
            html += `<td class="highlight">-</td>`;
          } else {
            html += `<td>${getResult(p.id, op.id)}</td>`;
          }
        });

        html += `<td><b>${calculatePoints(p.id)}</b></td>`;
        html += "</tr>";
      });

      document.getElementById("crossTable").innerHTML = html;
    }

    renderTable();
    // PGN VIEWER
    let game = new Chess();
    //let board = Chessboard('board', { position: 'start' });
    let moves = [];
    let index = 0;
    let board; // global

    function openGame() {
      document.getElementById("modal").style.display = "block";

      if (board) {
        board.destroy();
      }

      setTimeout(() => {
        board = Chessboard('board', { position: 'start' });
        board.resize(); // 🔥 clave
      }, 50);

      fetch("data/game1.pgn")
        .then(r => r.text())
        .then(pgn => {
          game.load_pgn(pgn);
          moves = game.history();
          game.reset();
          index = 0;

          setTimeout(() => {
            board.position('start');
          }, 100);
        });
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }

    function next() {
      if (index < moves.length) {
        game.move(moves[index++]);
        board.position(game.fen());
      }
    }

    function prev() {
      if (index > 0) {
        game.undo();
        index--;
        board.position(game.fen());
      }
    }





  </script>
</body>

</html>

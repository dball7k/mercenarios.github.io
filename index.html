<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Ajedrez Mercenarios</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* NAVBAR */
.navbar {
  display: flex;
  background: #020617;
  padding: 12px;
  gap: 15px;
  border-bottom: 1px solid #334155;
  justify-content: space-around;
}

.nav-item {
  cursor: pointer;
  color: #94a3b8;
  font-size: 16px;
}

.nav-item.active {
  color: #38bdf8;
  font-weight: bold;
}

/* CONTENT */
.page {
  display: none;
  padding: 15px;
}

.page.active {
  display: block;
}

/* TABLE CONTAINER */
.table-container {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border: 1px solid #334155;
  border-radius: 10px;
}

/* TABLE */
table {
  border-collapse: collapse;
  min-width: 700px;
  width: 100%;
}

th, td {
  border: 1px solid #334155;
  padding: 8px;
  text-align: center;
  font-size: 14px;
}

th {
  background: #1e293b;
}

.player-name {
  text-align: left;
  padding-left: 10px;
  min-width: 140px;
}

.player-link {
  color: #38bdf8;
  text-decoration: none;
}

.player-link:hover {
  text-decoration: underline;
}

.highlight {
  background: #1e293b;
}

.win { color: #22c55e; }
.draw { color: #eab308; }
.loss { color: #ef4444; }

/* MOBILE */
@media (max-width: 600px) {
  h1 {
    font-size: 18px;
  }

  th, td {
    font-size: 12px;
    padding: 6px;
  }

  .player-name {
    min-width: 120px;
  }

  .nav-item {
    font-size: 14px;
  }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-item active" onclick="showPage('torneos', this)">Torneos</div>
  <div class="nav-item" onclick="showPage('fotos', this)">Fotos</div>
  <div class="nav-item" onclick="showPage('chismes', this)">Chismes</div>
</div>

<!-- TORNEOS -->
<div id="torneos" class="page active">
  <h1>♟️ FIDE Mercenarios 245</h1>

  <div class="table-container">
    <table id="crossTable"></table>
  </div>
</div>

<!-- FOTOS -->
<div id="fotos" class="page">
  <h1>📸 Fotos</h1>
  <p>Aquí puedes subir fotos del torneo próximamente...</p>
</div>

<!-- CHISMES -->
<div id="chismes" class="page">
  <h1>🔥 Chismes</h1>
  <p>Drama ajedrecístico en desarrollo… 👀</p>
</div>

<script>

// NAV
function showPage(pageId, element) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");

  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  element.classList.add("active");
}

// PLAYERS
const players = [
  {id:1, name:"Fran", lichess:"dball7"},
  {id:2, name:"Wero", lichess:""},
  {id:3, name:"Francisco Torres", lichess:""},
  {id:4, name:"Luis", lichess:""},
  {id:5, name:"Pedro", lichess:""},
  {id:6, name:"Ana", lichess:""},
  {id:7, name:"Sofia", lichess:""},
  {id:8, name:"Carlos", lichess:""},
  {id:9, name:"Mario", lichess:""},
  {id:10, name:"Elena", lichess:""},
  {id:11, name:"Raul", lichess:""},
  {id:12, name:"Diego", lichess:""},
];

// MATCHES
const matches = [
  {white:1, black:2, result:1},
  {white:1, black:3, result:0.5},
  {white:2, black:3, result:0},
  {white:4, black:1, result:0},
  {white:5, black:1, result:1},
];

// HELPERS
function getResult(p1, p2){
  const match = matches.find(m =>
    (m.white === p1 && m.black === p2) ||
    (m.white === p2 && m.black === p1)
  );

  if(!match) return "";

  let score;

  if(match.white === p1){
    score = match.result;
  } else {
    score = match.result === 1 ? 0 :
            match.result === 0 ? 1 : 0.5;
  }

  if(score === 1) return '<span class="win">1</span>';
  if(score === 0) return '<span class="loss">0</span>';
  return '<span class="draw">½</span>';
}

function calculatePoints(playerId){
  let pts = 0;

  matches.forEach(m=>{
    if(m.result === null) return;

    if(m.white === playerId){
      pts += m.result;
    } else if(m.black === playerId){
      pts += (m.result === 1 ? 0 :
              m.result === 0 ? 1 : 0.5);
    }
  });

  return pts;
}

function renderPlayerName(player){
  if(player.lichess){
    return `<a class="player-link" href="https://lichess.org/@/${player.lichess}" target="_blank">${player.name}</a>`;
  }
  return player.name;
}

// RENDER
function renderTable(){

  let html = "<tr><th>#</th><th>Jugador</th>";

  players.forEach((p,i)=>{
    html += `<th>${i+1}</th>`;
  });

  html += "<th>Pts</th></tr>";

  players.forEach((p,i)=>{

    html += `<tr>
      <td>${i+1}</td>
      <td class="player-name">${renderPlayerName(p)}</td>
    `;

    players.forEach(op=>{
      if(p.id === op.id){
        html += `<td class="highlight">-</td>`;
      } else {
        html += `<td>${getResult(p.id, op.id)}</td>`;
      }
    });

    html += `<td><b>${calculatePoints(p.id)}</b></td>`;
    html += "</tr>";
  });

  document.getElementById("crossTable").innerHTML = html;
}

renderTable();

</script>

</body>
</html>
